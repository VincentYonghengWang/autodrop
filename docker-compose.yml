services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    build:
      context: ./backend
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=8
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - db
      - redis

  beat:
    build:
      context: ./backend
    command: celery -A app.worker.celery_app beat --loglevel=info
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      - worker

  flower:
    build:
      context: ./backend
    command: celery -A app.worker.celery_app flower --port=5555
    env_file:
      - .env
    ports:
      - "5555:5555"
    depends_on:
      - worker

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: autodrop
      POSTGRES_USER: autodrop
      POSTGRES_PASSWORD: autodrop
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  frontend:
    build:
      context: ./frontend
    command: npm run dev -- --host 0.0.0.0
    env_file:
      - .env
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:

